name: Fix My Streak
on:
  workflow_dispatch: 

# Isse workflow ko repository me commit push karne ka official access milega
permissions:
  contents: write

jobs:
  backdate-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make Backdated Commits
        run: |
          git config --global user.name "sanidhya2068"
          git config --global user.email "sanidhyasinghrathore5@gmail.com"
          
          # Pehle check karein agar file nahi hai toh create karein
          touch streak.txt
          git add streak.txt
          
          # 18 Tarik ka commit
          echo "18 July Fix" >> streak.txt
          GIT_AUTHOR_DATE="2026-07-18T12:00:00" GIT_COMMITTER_DATE="2026-07-18T12:00:00" git commit -am "Fixing 18"
          
          # 19 Tarik ka commit
          echo "19 July Fix" >> streak.txt
          GIT_AUTHOR_DATE="2026-07-19T12:00:00" GIT_COMMITTER_DATE="2026-07-19T12:00:00" git commit -am "Fixing 19"
          
          # 20 Tarik ka commit
          echo "20 July Fix" >> streak.txt
          GIT_AUTHOR_DATE="2026-07-20T12:00:00" GIT_COMMITTER_DATE="2026-07-20T12:00:00" git commit -am "Fixing 20"
          
          # Push changes directly
          git push origin HEAD:main
